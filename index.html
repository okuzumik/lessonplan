<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif}
#app{display:flex;gap:8px;padding:8px;background:var(--color-background-tertiary,#f5f5f3);border-radius:12px;height:790px}
#wiz{width:310px;flex-shrink:0;background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary,#e0e0e0);border-radius:12px;display:flex;flex-direction:column;overflow:hidden}
#sbar{padding:8px 10px;border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0);display:flex;flex-wrap:wrap;gap:4px}
.sd{width:24px;height:24px;border-radius:50%;border:0.5px solid #ccc;background:#f5f5f5;color:#888;font-size:9px;font-weight:500;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s}
.sd.act{background:#185FA5;color:#E6F1FB;border-color:#185FA5}
.sd.dn{background:#0F6E56;color:#E1F5EE;border-color:#0F6E56}
#fc{flex:1;overflow-y:auto;padding:12px}
.sn{font-size:9px;color:#888}
.st{font-size:13px;font-weight:500;color:#222;margin:2px 0 10px}
.fg{margin-bottom:9px}
.fg>label{display:block;font-size:10px;color:#666;margin-bottom:3px}
input[type=text],input[type=number],textarea{width:100%;padding:5px 8px;border:0.5px solid #ccc;border-radius:6px;font-size:11px;font-family:sans-serif;color:#222;background:#fff;outline:none}
input[type=text]:focus,input[type=number]:focus,textarea:focus{border-color:#185FA5}
textarea{resize:vertical;min-height:52px;line-height:1.5}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ckr{display:flex;flex-wrap:wrap;gap:6px;margin-top:3px}
.ckr label{display:flex;align-items:center;gap:3px;font-size:10px;cursor:pointer;color:#333}
.ckr input[type=checkbox],.ckr input[type=radio]{width:auto;accent-color:#185FA5}
.eigobox{background:#f0f6ff;border:0.5px solid #B5D4F4;border-radius:6px;padding:5px 8px;margin-top:5px;display:flex;align-items:center;gap:5px;cursor:pointer}
.eigobox input{width:auto;accent-color:#185FA5}
.eigobox span{font-size:10px;color:#185FA5}
.scht{width:100%;border-collapse:collapse;font-size:9px;table-layout:fixed}
.scht th{background:#f0f0f0;padding:2px;border:0.5px solid #ccc;font-weight:500;text-align:center}
.scht td{border:0.5px solid #ccc;padding:2px;vertical-align:middle;text-align:center}
.scht input[type=text]{border:none;background:transparent;font-size:9px;width:100%;padding:0;min-width:0}
.scht input[type=checkbox],.scht input[type=radio]{width:auto;accent-color:#185FA5}
.fblk{border:0.5px solid #ddd;border-radius:8px;padding:7px;margin-bottom:6px;background:#fafafa}
.ftop{display:flex;gap:5px;align-items:flex-start;margin-bottom:4px}
.fn{width:16px;height:16px;border-radius:50%;background:#185FA5;color:#E6F1FB;font-size:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:3px}
.rmb{background:none;border:none;cursor:pointer;font-size:13px;color:#bbb;line-height:1;padding:2px;margin-top:2px}
.rmb:hover{color:#A32D2D}
.addb{width:100%;border:0.5px dashed #ccc;border-radius:8px;padding:4px;font-size:10px;color:#888;cursor:pointer;background:none;margin-top:4px}
.addb:hover{background:#f5f5f5}
.eb{border:0.5px solid #ddd;border-radius:8px;padding:8px;margin-bottom:7px}
.et{font-size:10px;font-weight:500;margin-bottom:6px}
.tbar{font-size:9px;color:#666;padding:4px 7px;border-radius:6px;border:0.5px solid #ddd;background:#f5f5f5;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.tok{color:#0F6E56;font-weight:500}
.tov{color:#A32D2D;font-weight:500}
.hint{font-size:9px;color:#888;background:#f0f6ff;padding:4px 8px;border-radius:6px;margin-bottom:8px;border-left:2px solid #185FA5}
#nav{padding:8px 10px;border-top:0.5px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center}
.np{font-size:10px;color:#888}
.nb{display:flex;gap:5px}
#prv{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:8px;background:#fff;border:0.5px solid #e0e0e0;border-radius:12px}
@media print{#app{display:none!important}#prt{display:block!important}}
#prt{display:none}

.sec-highlight{
  position:relative;
}
.sec-highlight::after{
  content:'';
  position:absolute;
  inset:0;
  border:2.5px solid #E24B4A;
  border-radius:2px;
  pointer-events:none;
  animation:sec-pulse 1.8s ease-in-out infinite;
  z-index:9999;
}
@keyframes sec-pulse{
  0%,100%{box-shadow:inset 0 0 6px rgba(226,75,74,0.10);}
  50%{box-shadow:inset 0 0 12px rgba(226,75,74,0.25);}
}
</style>
</head>

<div id="landing" style="display:flex;align-items:center;justify-content:center;min-height:600px;padding:20px;background:var(--color-background-tertiary,#f5f5f3);border-radius:12px">
  <div style="background:#fff;border-radius:16px;border:0.5px solid #e0e0e0;padding:40px 36px;max-width:440px;width:100%;text-align:center">
    <div style="font-size:28px;margin-bottom:6px">📋</div>
    <div style="font-size:20px;font-weight:500;color:#222;margin-bottom:4px">れっすん・ぷらん</div>
    <div style="font-size:12px;color:#888;margin-bottom:32px;letter-spacing:.5px">Side-B メーカー　v0.9</div>

    <button onclick="startBlank()" style="display:block;width:100%;padding:14px 16px;margin-bottom:10px;background:#185FA5;color:#E6F1FB;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;text-align:left">
      ✏️　新規作成（空白）
      <div style="font-size:10px;font-weight:400;opacity:.8;margin-top:2px">すべて空白のフォームからスタートします</div>
    </button>

    <button onclick="startSample()" style="display:block;width:100%;padding:14px 16px;margin-bottom:10px;background:#0F6E56;color:#E1F5EE;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;text-align:left">
      📝　新規作成（サンプル入り）
      <div style="font-size:10px;font-weight:400;opacity:.8;margin-top:2px">記入例が入った状態で始められます</div>
    </button>

    <label style="display:block;width:100%;padding:14px 16px;margin-bottom:0;background:#fff;color:#444;border:0.5px solid #ccc;border-radius:10px;font-size:13px;font-weight:400;cursor:pointer;text-align:left">
      📂　保存データを読み込む（JSON）
      <div style="font-size:10px;color:#888;margin-top:2px">以前保存した JSON ファイルを選択して再編集します</div>
      <input type="file" accept=".json" onchange="loadAndStart(event)" style="display:none">
    </label>

    <div id="landmsg" style="font-size:11px;color:#A32D2D;margin-top:12px;min-height:16px"></div>
  </div>
</div>
<div id="app" style="display:none">
  <div id="wiz">
    <div style="padding:7px 10px;border-bottom:0.5px solid #e0e0e0;display:flex;align-items:center;justify-content:space-between"><button onclick="goTop()" style="font-size:10px;color:#888;background:none;border:0.5px solid #ddd;border-radius:6px;padding:3px 8px;cursor:pointer">← トップへ</button><span style="font-size:10px;font-weight:500;color:#555">れっすん・ぷらん Side-B</span></div><div id="sbar"></div>
    <div id="fc"></div>
    <div id="nav">
      <span class="np" id="prg"></span>
      <div class="nb">
        <button id="bp" onclick="go(-1)">← 前へ</button>
        <button id="bn" onclick="go(1)">次へ →</button>
      </div>
    </div>
  </div>
  <div id="prv"><div id="pvb"></div></div>
</div>
<div id="prt"><div id="ppa"></div></div>

function isEigo(){return D.eigoFlag;}
function u(k,v){D[k]=v;render();}
function uS(i,k,v){D.sched[i][k]=v;if(k==='ima'&&v)D.sched.forEach((r,j)=>{if(j!==i)r.ima=false;});render();}
function uEv(i,k,v){D.ev[i][k]=v;render();}
function uF(i,k,v){D.flow[i][k]=v;render();}
function addF(){D.flow.push({t:'',sub:'',min:5,hyoka:[]});render();}
function moveF(i,d){var n=i+d;if(n<0||n>=D.flow.length)return;var tmp=D.flow[i];D.flow[i]=D.flow[n];D.flow[n]=tmp;render();}
function removeF(i){D.flow.splice(i,1);render();}
function togA(arr,v){var x=arr.indexOf(v);x>=0?arr.splice(x,1):arr.push(v);render();}
function togObs(k,v){togA(D[k],v);}
function togRyo(k,v){togA(D[k],v);}
function togEvR(i,v){togA(D.ev[i].ryo,v);}
function uFH(i,v){togA(D.flow[i].hyoka,v);}
function moveS(i,d){var n=i+d;if(n<0||n>=D.sched.length)return;var tmp=D.sched[i];D.sched[i]=D.sched[n];D.sched[n]=tmp;D.sched.forEach(function(r,j){r.ji=j+1;});render();}

function setSchedCount(n){
  n=Math.max(1,Math.min(30,parseInt(n)||8));
  D.schedCount=n;
  // 行を増減
  while(D.sched.length<n) D.sched.push({ji:D.sched.length+1,nai:'',ch:false,sh:false,su:false,ima:false});
  if(D.sched.length>n) D.sched=D.sched.slice(0,n);
  // 行番号を振り直す
  D.sched.forEach((r,i)=>{r.ji=i+1;});
  render();
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ph(v,p){return(!v||!v.trim())?'<span style="color:#ccc;font-style:italic">'+(p||'　')+'</span>':esc(v);}

function usedMin(){return D.flow.reduce((s,f)=>s+(parseInt(f.min)||0),0);}

// ===== TAG HELPERS =====
function obsTags(arr){
  var OBS_COL={'知識・技能':{bg:'#FBEAF0',tc:'#72243E'},'思考・判断・表現':{bg:'#EEEDFE',tc:'#534AB7'},'主体的に学習に取り組む態度':{bg:'#FAEEDA',tc:'#854F0B'}};
  return arr.map(function(o){var col=OBS_COL[o]||{bg:'#E6F1FB',tc:'#0C447C'};return '<span style="background:'+col.bg+';color:'+col.tc+';font-size:5px;padding:1px 5px;border-radius:8px;font-weight:500">'+o+'</span>';}).join('');
}
function ryoTags(arr){
  var RYO_COL={
    '読むこと':           {bg:'#185FA5',tc:'#fff'},
    '聞くこと':           {bg:'#0F6E56',tc:'#fff'},
    '話すこと〔やり取り〕':{bg:'#C07800',tc:'#fff'},
    '話すこと〔発表〕':   {bg:'#B8335E',tc:'#fff'},
    '書くこと':           {bg:'#8B7D00',tc:'#fff'}
  };
  return arr.map(function(r){var col=RYO_COL[r]||{bg:'#444',tc:'#fff'};return '<span style="background:'+col.bg+';color:'+col.tc+';font-size:5px;padding:1px 5px;border-radius:8px;font-weight:500">'+r+'</span>';}).join('');
}
function metaRow(obsArr,ryoArr){
  if(!obsArr.length&&!ryoArr.length)return'';
  var parts=[];
  if(obsArr.length)parts.push('<span style="font-size:5px;color:#888;white-space:nowrap">観点：</span>'+obsTags(obsArr));
  if(ryoArr.length)parts.push('<span style="font-size:5px;color:#888;white-space:nowrap">領域：</span>'+ryoTags(ryoArr));
  return '<div style="border-top:0.5px solid #B5D4F4;padding-top:3px;display:flex;flex-wrap:wrap;gap:2px;align-items:center;margin-top:4px">'+parts.join('<span style="font-size:5px;color:#aaa;margin:0 2px">/</span>')+'</div>';
}

function drawHyokaLines(){
  var container=document.getElementById('pvb');
  if(!container)return;
  var old=container.querySelector('#hyoka-svg');
  if(old)old.remove();
  var flows=container.querySelectorAll('[data-flow]');
  var evrows=container.querySelectorAll('[data-evrow]');
  if(!flows.length||!evrows.length)return;
  var cr=container.getBoundingClientRect();
  var EV_LINE_COL=['#D4537E','#7F77DD','#EF9F27'];
  var lines=[];
  flows.forEach(function(fb){
    var hy=fb.getAttribute('data-hyoka');
    if(!hy)return;
    var idxs=hy.split(',').map(Number).filter(function(n){return !isNaN(n);});
    var fbr=fb.getBoundingClientRect();
    var x0=fbr.right-cr.left;
    var y0=fbr.top-cr.top+fbr.height/2;
    idxs.forEach(function(idx){
      var er=evrows[idx];
      if(!er)return;
      var err=er.getBoundingClientRect();
      var x1=err.left-cr.left;
      var y1=err.top-cr.top+err.height/2;
      var cx=(x0+x1)/2;
      lines.push('<path d="M'+x0+','+y0+' C'+cx+','+y0+' '+cx+','+y1+' '+x1+','+y1+'" stroke="'+EV_LINE_COL[idx]+'" stroke-width="1.2" stroke-dasharray="3,2" fill="none" opacity="0.7"/>');
    });
  });
  if(!lines.length)return;
  var w=cr.width,h=cr.height;
  var svg='<svg id="hyoka-svg" style="position:absolute;top:0;left:0;width:'+w+'px;height:'+h+'px;pointer-events:none;overflow:visible" xmlns="http://www.w3.org/2000/svg">'+lines.join('')+'</svg>';
  container.style.position='relative';
  container.insertAdjacentHTML('beforeend',svg);
}

  ];

  var det=document.getElementById('ck-detail');
  if(!det)return;
  if(idx<0){
    // 全リスト表示
    var sh=parseInt(D.startH)||9, sm=(D.startM===undefined||D.startM===null)?0:parseInt(D.startM)||0;
    var cur=sh*60+sm;
    det.innerHTML='<div style="font-size:11px;color:#aaa;margin-bottom:12px">セグメントをクリックすると詳細が表示されます</div>'
      +flows.map(function(f,i){
        var m=parseInt(f.min)||0;
        var col=FLOW_COLS_CK[i%FLOW_COLS_CK.length];
        var st=(Math.floor(cur/60)%24).toString().padStart(2,'0')+':'+((cur%60)).toString().padStart(2,'0');
        var en=(Math.floor((cur+m)/60)%24).toString().padStart(2,'0')+'：'+((cur+m)%60).toString().padStart(2,'0');
        cur+=m;
        return '<div onclick="clockSegClick('+i+')" style="display:flex;gap:8px;align-items:flex-start;padding:8px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:4px">'
          +'<div style="width:14px;height:14px;border-radius:3px;background:'+col.bg+';border:1.5px solid '+col.stroke+';flex-shrink:0;margin-top:2px"></div>'
          +'<div><div style="font-size:13px;font-weight:500;color:'+col.stroke+'">'+esc(f.t||'')+'</div>'
          +'<div style="font-size:10px;color:#888">'+st+' 〜 '+en+' （'+m+'分）</div></div>'
        +'</div>';
      }).join('');
    return;
  }
  var f=flows[idx];
  if(!f)return;
  var m=parseInt(f.min)||0;
  var col=FLOW_COLS_CK[idx%FLOW_COLS_CK.length];
  var sh=parseInt(D.startH)||9, sm=(D.startM===undefined||D.startM===null)?0:parseInt(D.startM)||0;
  var elapsed=0;
  flows.slice(0,idx).forEach(function(ff){elapsed+=parseInt(ff.min)||0;});
  var startTotal=sh*60+sm+elapsed;
  var stStr=(Math.floor(startTotal/60)%24).toString().padStart(2,'0')+':'+((startTotal%60)).toString().padStart(2,'0');
  var endTotal=startTotal+m;
  var enStr=(Math.floor(endTotal/60)%24).toString().padStart(2,'0')+':'+((endTotal%60)).toString().padStart(2,'0');
  var subs=(f.sub||'').split('\n').filter(function(l){return l.trim();});
  var memo=D.clockMemos[idx]||'';
  var hasEv=f.hyoka&&f.hyoka.length;
  det.innerHTML=
    '<div style="background:'+col.bg+';border-radius:12px;padding:16px 20px;margin-bottom:14px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'
        +'<div style="width:26px;height:26px;border-radius:50%;background:'+col.stroke+';color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(idx+1)+'</div>'
        +'<div style="font-size:17px;font-weight:700;color:'+col.stroke+'">'+esc(f.t||'')+'</div>'
        +(hasEv?'<span style="background:#222;color:#fff;font-size:10px;padding:2px 8px;font-weight:700;margin-left:4px">評価ポイント</span>':'')
      +'</div>'
      +'<div style="font-size:12px;color:'+col.stroke+';opacity:.8;margin-left:34px">'+stStr+' 〜 '+enStr+'　（'+m+'分）</div>'
    +'</div>'
    +(subs.length?'<div style="margin-bottom:14px">'
      +'<div style="font-size:11px;color:#aaa;margin-bottom:6px;font-weight:500">活動内容</div>'
      +subs.map(function(l){return '<div style="font-size:13px;color:#444;padding:3px 0;line-height:1.6">'+esc(l)+'</div>';}).join('')
    +'</div>':'')
    +(memo?'<div style="background:#FFFDE7;border-radius:8px;padding:12px 16px;margin-bottom:14px">'
      +'<div style="font-size:11px;color:#E65100;font-weight:500;margin-bottom:4px">📝 メモ</div>'
      +'<div style="font-size:13px;color:#444;line-height:1.7;white-space:pre-wrap">'+esc(memo)+'</div>'
    +'</div>':'')
    +(hasEv?'<div style="background:#FBEAF0;border-radius:8px;padding:12px 16px;">'
      +'<div style="font-size:11px;color:#72243E;font-weight:500;margin-bottom:8px">本時の評価場面</div>'
      +(f.hyoka||[]).map(function(kanmoku){
        var evIdx=['知識・技能','思考・判断・表現','主体的に学習に取り組む態度'].indexOf(kanmoku);
        var ev=evIdx>=0?D.ev[evIdx]:null;
        var EV_COL=[{tc:'#72243E',bg:'#FBEAF0'},{tc:'#534AB7',bg:'#EEEDFE'},{tc:'#854F0B',bg:'#FAEEDA'}];
        var col=EV_COL[evIdx]||{tc:'#444',bg:'#f5f5f5'};
        return '<div style="margin-bottom:10px">'
          +'<div style="font-size:12px;font-weight:700;color:'+col.tc+';margin-bottom:6px">'+kanmoku+'</div>'
          +(ev&&ev.kij?'<div style="font-size:12px;color:#444;margin-bottom:6px;padding:6px 10px;background:#fff;border-radius:6px;line-height:1.6">'
            +'<div style="font-size:10px;color:#999;margin-bottom:2px">評価規準（何ができるか）</div>'
            +esc(ev.kij)
          +'</div>':'')
          +(ev&&(ev.aK||ev.bK)?'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">'
            +(ev.aK?'<div style="padding:6px 8px;background:#fff;border-radius:6px;font-size:11px;line-height:1.5">'
              +'<div style="font-size:10px;color:#999;margin-bottom:2px">A（十分満足）</div>'
              +esc(ev.aK)+'</div>':'')
            +(ev.bK?'<div style="padding:6px 8px;background:#fff;border-radius:6px;font-size:11px;line-height:1.5">'
              +'<div style="font-size:10px;color:#999;margin-bottom:2px">B（おおむね満足）</div>'
              +esc(ev.bK)+'</div>':'')
          +'</div>':'')
        +'</div>';
      }).join('')
    +'</div>':'')
    +'<div style="margin-top:16px">'
      +'<button onclick="renderClockDetail(-1)" style="font-size:11px;color:#888;background:none;border:0.5px solid #ddd;border-radius:6px;padding:5px 12px;cursor:pointer">← 一覧に戻る</button>'
    +'</div>';

function startClock(){
  renderClock();
  if(window._clockTimer) clearInterval(window._clockTimer);
  window._clockTimer=setInterval(renderClock,1000);
}
function renderClock(){
  var now=new Date();
  var hh=String(now.getHours()).padStart(2,'0');
  var mm=String(now.getMinutes()).padStart(2,'0');
  var ss=String(now.getSeconds()).padStart(2,'0');
  var el=document.getElementById('fs-time');
  if(el) el.textContent=hh+':'+mm+':'+ss;

  var FLOW_COLS2=[
    {bg:'#E6F1FB',tc:'#0C447C',solid:'#378ADD'},
    {bg:'#E1F5EE',tc:'#085041',solid:'#1D9E75'},
    {bg:'#EEEDFE',tc:'#3C3489',solid:'#7F77DD'},
    {bg:'#FAEEDA',tc:'#633806',solid:'#EF9F27'},
    {bg:'#FAECE7',tc:'#712B13',solid:'#D85A30'},
    {bg:'#EAF3DE',tc:'#27500A',solid:'#639922'},
    {bg:'#FBEAF0',tc:'#72243E',solid:'#D4537E'},
    {bg:'#E6F1FB',tc:'#0C447C',solid:'#378ADD'}
  ];

  var flows=D.flow.filter(function(f){return f.t;});
  var total=flows.reduce(function(s,f){return s+(parseInt(f.min)||0);},0)||1;
  // remark rows (yadai / kadai) get a thin slice too
  var yadaiMin=total>0?0:0; // only actual flow items

  // Build pie chart SVG
  var cx=140,cy=140,R=120,r=55; // donut
  var startAngle=-Math.PI/2; // 12 o'clock
  function polarToXY(angle,radius){
    return {x:cx+radius*Math.cos(angle), y:cy+radius*Math.sin(angle)};
  }
  function slicePath(start,end,outerR,innerR){
    var p1=polarToXY(start,outerR);
    var p2=polarToXY(end,outerR);
    var p3=polarToXY(end,innerR);
    var p4=polarToXY(start,innerR);
    var large=end-start>Math.PI?1:0;
    return 'M '+p1.x+' '+p1.y
      +' A '+outerR+' '+outerR+' 0 '+large+' 1 '+p2.x+' '+p2.y
      +' L '+p3.x+' '+p3.y
      +' A '+innerR+' '+innerR+' 0 '+large+' 0 '+p4.x+' '+p4.y
      +' Z';
  }

  var slices='';
  var legendItems='';
  var angle=startAngle;
  flows.forEach(function(f,i){
    var m=parseInt(f.min)||0;
    if(!m)return;
    var sweep=(m/total)*2*Math.PI;
    var col=FLOW_COLS2[i%FLOW_COLS2.length];
    var endAngle=angle+sweep;
    slices+='<path d="'+slicePath(angle,endAngle,R,r)+'" fill="'+col.solid+'" stroke="#fff" stroke-width="2"/>';
    // label at midpoint
    var mid=angle+sweep/2;
    var lx=cx+(R*0.72)*Math.cos(mid);
    var ly=cy+(R*0.72)*Math.sin(mid);
    if(sweep>0.18){
      slices+='<text x="'+lx+'" y="'+ly+'" text-anchor="middle" dominant-baseline="middle" '
        +'fill="#fff" font-size="9" font-weight="700">'+m+'分</text>';
    }
    legendItems+='<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:#444">'
      +'<div style="width:10px;height:10px;border-radius:2px;background:'+col.solid+';flex-shrink:0"></div>'
      +(i+1)+'. '+f.t
    +'</div>';
    angle=endAngle;
  });

  // Clock hand based on current minute within lesson
  // hand always points to 12 o'clock for now (decorative center dot)
  var handAngle=startAngle; // could be made dynamic
  var handX=cx+r*0.6*Math.cos(handAngle);
  var handY=cy+r*0.6*Math.sin(handAngle);

  // Center: lesson goal snippet
  var goalText=D.hMok?D.hMok.slice(0,20)+(D.hMok.length>20?'…':''):'';

  var svg='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="#f8f8f6"/>'
    +slices
    +'<circle cx="'+cx+'" cy="'+cy+'" r="8" fill="#555"/>'
    +(goalText?'<text x="'+cx+'" y="'+(cy-12)+'" text-anchor="middle" font-size="8" fill="#666">'+goalText+'</text>':'')
    +'<text x="'+cx+'" y="'+(cy+6)+'" text-anchor="middle" font-size="10" fill="#555" font-weight="700">'+total+'分</text>';

  var pieEl=document.getElementById('fs-pie');
  if(pieEl) pieEl.innerHTML=svg;
  var legEl=document.getElementById('fs-pie-legend');
  if(legEl) legEl.innerHTML=legendItems;

  // Activity list on right
  var fEl=document.getElementById('fs-flows');
  if(fEl){
    fEl.innerHTML=flows.map(function(f,i){
      var col=FLOW_COLS2[i%FLOW_COLS2.length];
      var hasEv=f.hyoka&&f.hyoka.length;
      var subs=(f.sub||'').split('\n').filter(function(l){return l.trim();});
      return '<div style="background:'+col.bg+';border-radius:10px;padding:12px 16px;margin-bottom:8px">'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'
          +'<div style="width:22px;height:22px;border-radius:50%;background:'+col.tc+';color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(i+1)+'</div>'
          +'<div style="font-size:15px;font-weight:700;color:'+col.tc+';flex:1">'+f.t+'</div>'
          +(f.min?'<div style="font-size:13px;color:'+col.tc+';opacity:.7;white-space:nowrap">'+f.min+'分</div>':'')
          +(hasEv?'<span style="background:#222;color:#fff;font-size:9px;padding:2px 7px;font-weight:700;margin-left:4px">評価ポイント</span>':'')
        +'</div>'
        +(subs.length?'<div style="padding-left:30px">'+subs.map(function(l){return '<div style="font-size:13px;color:'+col.tc+';opacity:.85;line-height:1.7">'+l+'</div>';}).join('')+'</div>':'')
      +'</div>';
    }).join('');
  }
}

function doLoad(event){
  var file=event.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var loaded=JSON.parse(e.target.result);
      if(typeof loaded!=='object'||!loaded.kamoku)throw new Error('invalid');
      Object.assign(D,loaded);
      D.step=0;
      render();
      var msg=document.getElementById('loadmsg');
      if(msg){msg.style.color='#0F6E56';msg.textContent='✓ 読み込みました：'+file.name;setTimeout(function(){if(msg)msg.textContent='';},4000);}
    }catch(err){
      var msg=document.getElementById('loadmsg');
      if(msg){msg.style.color='#A32D2D';msg.textContent='⚠ 読み込みに失敗しました。正しいファイルか確認してください。';setTimeout(function(){if(msg){msg.textContent='';msg.style.color='#0F6E56';}},5000);}
    }
  };
  reader.readAsText(file);
  event.target.value='';
}

function minToAngle(m){ return (m/60)*360-90; } // 0分=上(12時)=−90度
function degToRad(d){ return d*Math.PI/180; }

function buildClock(){
  var d=D;
  var flows=d.flow.filter(function(f){return f.t;});
  var tot=parseInt(d.totalTime)||50;
  var startH=parseInt(d.startH)||9;
  var startM=(d.startM===undefined||d.startM===null)?0:parseInt(d.startM)||0;

  var CX=240,CY=240,R=180,RI=80;
  var FLOW_COLS_CK=[
    {bg:'#E6F1FB',stroke:'#185FA5'},
    {bg:'#E1F5EE',stroke:'#0F6E56'},
    {bg:'#EEEDFE',stroke:'#534AB7'},
    {bg:'#FAEEDA',stroke:'#854F0B'},
    {bg:'#FAECE7',stroke:'#993C1D'},
    {bg:'#EAF3DE',stroke:'#27500A'},
    {bg:'#FBEAF0',stroke:'#72243E'},
    {bg:'#E6F1FB',stroke:'#185FA5'}
  ];

  // 60分以内→時計モード、60分超→比率モード
  var clockMode=(tot<=60);
  // clockMode: 円全体＝60分、分針の位置に合わせて描画
  // ratioMode: 円全体＝授業時間、等分で活動を描画、外周に実時刻ラベル

  var svg='';
  svg+='<circle cx="'+CX+'" cy="'+CY+'" r="'+R+'" fill="#fafafa" stroke="#ddd" stroke-width="1.5"/>';
  svg+='<circle cx="'+CX+'" cy="'+CY+'" r="'+RI+'" fill="white" stroke="#eee" stroke-width="1"/>';

  if(clockMode){
    // === 時計モード: 60分ダイヤル ===
    // 分目盛り
    for(var i=0;i<60;i++){
      var a=degToRad((i/60)*360-90);
      var isBig=(i%5===0);
      var r0=isBig?R-18:R-10;
      svg+='<line x1="'+(CX+Math.cos(a)*r0)+'" y1="'+(CY+Math.sin(a)*r0)+'" x2="'+(CX+Math.cos(a)*(R-3))+'" y2="'+(CY+Math.sin(a)*(R-3))+'" stroke="'+(isBig?'#bbb':'#ddd')+'" stroke-width="'+(isBig?1.5:0.8)+'"/>';
    }
    // 5分ごとの数字
    for(var i=0;i<12;i++){
      var m=i*5;
      var a=degToRad((m/60)*360-90);
      svg+='<text x="'+(CX+Math.cos(a)*(R-30))+'" y="'+(CY+Math.sin(a)*(R-30))+'" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#999" font-family="sans-serif">'+m+'</text>';
    }
    // 授業時間帯ベース
    var baseStart=((startM%60)/60)*360-90;
    svg+='<path d="'+describeArc(CX,CY,R-3,RI+3,baseStart,baseStart+tot/60*360)+'" fill="#f0f0f0" stroke="none"/>';
    // 活動扇形
    var cur=startM;
    flows.forEach(function(f,i){
      var m=parseInt(f.min)||0; if(m<=0)return;
      var aS=((cur%60)/60)*360-90;
      var col=FLOW_COLS_CK[i%FLOW_COLS_CK.length];
      svg+='<path d="'+describeArc(CX,CY,R-3,RI+3,aS,aS+m/60*360)+'" fill="'+col.bg+'" stroke="'+col.stroke+'" stroke-width="1.5" style="cursor:pointer" onclick="clockSegClick('+i+')" />';
      var borderAngle=degToRad(aS);
      svg+='<line x1="'+(CX+Math.cos(borderAngle)*(RI+3))+'" y1="'+(CY+Math.sin(borderAngle)*(RI+3))+'" x2="'+(CX+Math.cos(borderAngle)*(R-3))+'" y2="'+(CY+Math.sin(borderAngle)*(R-3))+'" stroke="'+col.stroke+'" stroke-width="1.5"/>';
      var midAngle=degToRad(aS+m/60*180);
      var labelR=(R-3+RI+3)/2;
      var lx=CX+Math.cos(midAngle)*labelR, ly=CY+Math.sin(midAngle)*labelR;
      var arcDeg=m/60*360;
      var title=f.t||'';
      var arcPx=degToRad(arcDeg)*labelR;
      var maxChars=Math.floor(arcPx/6.5);
      if(arcDeg>=12){
        var short=title.length>maxChars?title.slice(0,Math.max(2,maxChars))+'…':title;
        svg+='<text text-anchor="middle" font-family="sans-serif" style="pointer-events:none">';
        if(arcDeg<22) svg+='<tspan x="'+lx+'" y="'+ly+'" font-size="10" fill="'+col.stroke+'" font-weight="bold">'+(i+1)+'</tspan>';
        else if(arcDeg<40){
          svg+='<tspan x="'+lx+'" y="'+(ly-5)+'" font-size="8" fill="'+col.stroke+'" font-weight="bold">'+(i+1)+'</tspan>';
          svg+='<tspan x="'+lx+'" y="'+(ly+6)+'" font-size="7.5" fill="'+col.stroke+'">'+short+'</tspan>';
        } else {
          svg+='<tspan x="'+lx+'" y="'+(ly-9)+'" font-size="9" fill="'+col.stroke+'" font-weight="bold">'+(i+1)+'</tspan>';
          svg+='<tspan x="'+lx+'" y="'+(ly+3)+'" font-size="8" fill="'+col.stroke+'">'+short+'</tspan>';
          svg+='<tspan x="'+lx+'" y="'+(ly+14)+'" font-size="7.5" fill="'+col.stroke+'" opacity="0.7">'+m+'分</tspan>';
        }
        svg+='</text>';
      }
      // 外周の分ラベル
      svg+='<text x="'+(CX+Math.cos(borderAngle)*(R+20))+'" y="'+(CY+Math.sin(borderAngle)*(R+20))+'" text-anchor="middle" dominant-baseline="middle" font-size="9.5" fill="#666" font-family="sans-serif">'+(cur%60)+'</text>';
      cur+=m;
    });
    // 終了ラベル
    var endAngleRad=degToRad(((cur%60)/60)*360-90);
    svg+='<text x="'+(CX+Math.cos(endAngleRad)*(R+20))+'" y="'+(CY+Math.sin(endAngleRad)*(R+20))+'" text-anchor="middle" dominant-baseline="middle" font-size="9.5" fill="#A32D2D" font-weight="bold" font-family="sans-serif">'+(cur%60)+'</text>';
    // 中心
    svg+='<text x="'+CX+'" y="'+(CY-12)+'" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#444" font-family="sans-serif">'+startH.toString().padStart(2,'0')+':'+startM.toString().padStart(2,'0')+'</text>';
    svg+='<text x="'+CX+'" y="'+(CY+4)+'" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#888" font-family="sans-serif">開始</text>';
    svg+='<text x="'+CX+'" y="'+(CY+18)+'" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#888" font-family="sans-serif">'+tot+'分授業</text>';
    svg+='<g id="ck-needle"></g>';

  } else {
    // === 比率モード: 円全体 = 授業時間 ===
    // 目盛り（授業時間を10等分）
    var tickCount=10;
    for(var i=0;i<tickCount*5;i++){
      var a=degToRad((i/(tickCount*5))*360-90);
      var isBig=(i%5===0);
      var r0=isBig?R-18:R-10;
      svg+='<line x1="'+(CX+Math.cos(a)*r0)+'" y1="'+(CY+Math.sin(a)*r0)+'" x2="'+(CX+Math.cos(a)*(R-3))+'" y2="'+(CY+Math.sin(a)*(R-3))+'" stroke="'+(isBig?'#bbb':'#ddd')+'" stroke-width="'+(isBig?1.5:0.8)+'"/>';
    }
    // 外周に実時刻ラベル（10等分）
    for(var i=0;i<tickCount;i++){
      var elapsedMin=Math.round(i*tot/tickCount);
      var absMin=startH*60+startM+elapsedMin;
      var lh=Math.floor(absMin/60)%24, lm=absMin%60;
      var timeLabel=lh.toString().padStart(2,'0')+':'+lm.toString().padStart(2,'0');
      var a=degToRad((i/tickCount)*360-90);
      svg+='<text x="'+(CX+Math.cos(a)*(R+22))+'" y="'+(CY+Math.sin(a)*(R+22))+'" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="#666" font-family="sans-serif">'+timeLabel+'</text>';
    }
    // 活動扇形（比率で配置）
    var cur=0; // elapsed minutes from start
    flows.forEach(function(f,i){
      var m=parseInt(f.min)||0; if(m<=0)return;
      var aS=(cur/tot)*360-90;
      var sweep=(m/tot)*360;
      var col=FLOW_COLS_CK[i%FLOW_COLS_CK.length];
      svg+='<path d="'+describeArc(CX,CY,R-3,RI+3,aS,aS+sweep)+'" fill="'+col.bg+'" stroke="'+col.stroke+'" stroke-width="1.5" style="cursor:pointer" onclick="clockSegClick('+i+')" />';
      var borderAngle=degToRad(aS);
      svg+='<line x1="'+(CX+Math.cos(borderAngle)*(RI+3))+'" y1="'+(CY+Math.sin(borderAngle)*(RI+3))+'" x2="'+(CX+Math.cos(borderAngle)*(R-3))+'" y2="'+(CY+Math.sin(borderAngle)*(R-3))+'" stroke="'+col.stroke+'" stroke-width="1.5"/>';
      var midAngle=degToRad(aS+sweep/2);
      var labelR=(R-3+RI+3)/2;
      var lx=CX+Math.cos(midAngle)*labelR, ly=CY+Math.sin(midAngle)*labelR;
      var arcPx=degToRad(sweep)*labelR;
      var maxChars=Math.floor(arcPx/6.5);
      var title=f.t||'';
      if(sweep>=10){
        var short=title.length>maxChars?title.slice(0,Math.max(2,maxChars))+'…':title;
        svg+='<text text-anchor="middle" font-family="sans-serif" style="pointer-events:none">';
        if(sweep<18) svg+='<tspan x="'+lx+'" y="'+ly+'" font-size="10" fill="'+col.stroke+'" font-weight="bold">'+(i+1)+'</tspan>';
        else if(sweep<35){
          svg+='<tspan x="'+lx+'" y="'+(ly-5)+'" font-size="8" fill="'+col.stroke+'" font-weight="bold">'+(i+1)+'</tspan>';
          svg+='<tspan x="'+lx+'" y="'+(ly+6)+'" font-size="7.5" fill="'+col.stroke+'">'+short+'</tspan>';
        } else {
          svg+='<tspan x="'+lx+'" y="'+(ly-9)+'" font-size="9" fill="'+col.stroke+'" font-weight="bold">'+(i+1)+'</tspan>';
          svg+='<tspan x="'+lx+'" y="'+(ly+3)+'" font-size="8" fill="'+col.stroke+'">'+short+'</tspan>';
          svg+='<tspan x="'+lx+'" y="'+(ly+14)+'" font-size="7.5" fill="'+col.stroke+'" opacity="0.7">'+m+'分</tspan>';
        }
        svg+='</text>';
      }
      cur+=m;
    });
    // 中心
    svg+='<text x="'+CX+'" y="'+(CY-16)+'" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#444" font-family="sans-serif">'+startH.toString().padStart(2,'0')+':'+startM.toString().padStart(2,'0')+'〜</text>';
    var endH=Math.floor((startH*60+startM+tot)/60)%24, endMm=(startM+tot)%60;
    svg+='<text x="'+CX+'" y="'+(CY+2)+'" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#444" font-family="sans-serif">'+endH.toString().padStart(2,'0')+':'+endMm.toString().padStart(2,'0')+'</text>';
    svg+='<text x="'+CX+'" y="'+(CY+18)+'" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#888" font-family="sans-serif">'+tot+'分授業</text>';
    svg+='<g id="ck-needle"></g>';
  }

  var svgEl=document.getElementById('ck-svg');
  if(!svgEl)return;
  svgEl.innerHTML=svg;

  // レジェンド（共通）
  var leg='';
  var cur2=startH*60+startM;
  flows.forEach(function(f,i){
    var m=parseInt(f.min)||0; if(m<=0)return;
    var col=FLOW_COLS_CK[i%FLOW_COLS_CK.length];
    var st=(Math.floor(cur2/60)%24).toString().padStart(2,'0')+':'+((cur2%60)).toString().padStart(2,'0');
    var en2=(Math.floor((cur2+m)/60)%24).toString().padStart(2,'0')+':'+((( cur2+m)%60)).toString().padStart(2,'0');
    leg+='<div id="ckleg-'+i+'" onclick="clockSegClick('+i+')" style="display:flex;gap:8px;align-items:flex-start;padding:8px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:border-color .15s">'
      +'<div style="width:14px;height:14px;border-radius:3px;background:'+col.bg+';border:1.5px solid '+col.stroke+';flex-shrink:0;margin-top:2px"></div>'
      +'<div>'
        +'<div style="font-size:12px;font-weight:500;color:'+col.stroke+'">'+esc(f.t||'')+'</div>'
        +'<div style="font-size:10px;color:#888">'+st+' 〜 '+en2+' （'+m+'分）</div>'
        +(f.sub?'<div style="font-size:10px;color:#666;margin-top:2px">'+f.sub.replace(/\n/g,'<br>')+'</div>':'')
      +'</div>'
    +'</div>';
    cur2+=m;
  });
  var legEl=document.getElementById('ck-legend');
  if(legEl)legEl.innerHTML=leg;
  updateNeedle();
}

function describeArc(cx,cy,ro,ri,startDeg,endDeg){
  var s=degToRad(startDeg), e=degToRad(endDeg);
  var large=(endDeg-startDeg)>180?1:0;
  return [
    'M',cx+Math.cos(s)*ri,cy+Math.sin(s)*ri,
    'L',cx+Math.cos(s)*ro,cy+Math.sin(s)*ro,
    'A',ro,ro,0,large,1,cx+Math.cos(e)*ro,cy+Math.sin(e)*ro,
    'L',cx+Math.cos(e)*ri,cy+Math.sin(e)*ri,
    'A',ri,ri,0,large,0,cx+Math.cos(s)*ri,cy+Math.sin(s)*ri,
    'Z'
  ].join(' ');
}

function updateNeedle(){
  var svg=document.getElementById('ck-svg');
  if(!svg||!svg.parentNode)return;
  // SVGが空（buildClock未実行）なら針だけ追加しても意味がないので何もしない
  if(!svg.querySelector('[id]'))return;
  // 古い針を削除して毎回新規作成（innerHTML不使用）
  var old=document.getElementById('ck-needle');
  if(old) old.parentNode.removeChild(old);
  var NS='http://www.w3.org/2000/svg';
  var g=document.createElementNS(NS,'g');
  g.id='ck-needle';
  var CX=240,CY=240;
  var tot=parseInt(D.totalTime)||50;
  var startH=parseInt(D.startH)||9;
  var startM=(D.startM===undefined||D.startM===null)?0:parseInt(D.startM)||0;
  var now=new Date();
  var a;
  if(tot<=60){
    var m=now.getMinutes()+now.getSeconds()/60;
    a=degToRad((m/60)*360-90);
  } else {
    var nowMins=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;
    var startTotal=startH*60+startM;
    var elapsed=nowMins-startTotal;
    if(elapsed<0)elapsed=0; if(elapsed>tot)elapsed=tot;
    a=degToRad((elapsed/tot)*360-90);
  }
  var x2=CX+Math.cos(a)*170, y2=CY+Math.sin(a)*170;
  var tx=CX+Math.cos(a)*195, ty=CY+Math.sin(a)*195;
  var timeStr=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  var line=document.createElementNS(NS,'line');
  line.setAttribute('x1',CX); line.setAttribute('y1',CY);
  line.setAttribute('x2',x2); line.setAttribute('y2',y2);
  line.setAttribute('stroke','#E24B4A'); line.setAttribute('stroke-width','2.5');
  line.setAttribute('stroke-linecap','round');
  var dot=document.createElementNS(NS,'circle');
  dot.setAttribute('cx',CX); dot.setAttribute('cy',CY);
  dot.setAttribute('r','5'); dot.setAttribute('fill','#E24B4A');
  var txt=document.createElementNS(NS,'text');
  txt.setAttribute('x',tx); txt.setAttribute('y',ty);
  txt.setAttribute('text-anchor','middle'); txt.setAttribute('dominant-baseline','middle');
  txt.setAttribute('font-size','9'); txt.setAttribute('fill','#E24B4A');
  txt.setAttribute('font-weight','bold'); txt.setAttribute('font-family','sans-serif');
  txt.textContent=timeStr;
  g.appendChild(line); g.appendChild(dot); g.appendChild(txt);
  svg.appendChild(g);
}


function render(){
  document.getElementById('sbar').innerHTML=STS.map((s,i)=>'<div class="sd '+(i===D.step?'act':i<D.step?'dn':'')+'" onclick="goStep('+i+')" title="'+s.t+'">'+(i+1)+'</div>').join('');
  document.getElementById('fc').innerHTML=formHTML();
  document.getElementById('prg').textContent='ステップ '+(D.step+1)+' / '+STS.length;
  document.getElementById('bp').disabled=D.step===0;
  document.getElementById('bn').style.display=D.step===STS.length-1?'none':'';
  pvB();
  highlightSection();
}

function goTop(){
  document.getElementById('app').style.display='none';
  document.getElementById('landing').style.display='flex';
}

function startBlank(){
  // D をリセット（空白）
  Object.assign(D,{
    step:0,
    gakko:'',gakunen:'',kamoku:'',kyozai:'',
    nen:'',tsuki:'',hi:'',yobi:'',jigen:'',jusho:'',seito:'',
    eigoFlag:false,totalTime:50,startH:9,startM:45,kodawari:'',
    tMok:'',tObs:[],tRyo:[],schedCount:8,
    sched:Array.from({length:8},function(_,i){return {ji:i+1,nai:'',ch:false,sh:false,su:false,ima:false};}),
    hMok:'',hObs:[],hRyo:[],yadai:'',
    flow:[{t:'',sub:'',min:5,hyoka:[]}],
    kadai:'',
    ev:[{kij:'',aK:'',bK:'',ryo:[]},{kij:'',aK:'',bK:'',ryo:[]},{kij:'',aK:'',bK:'',ryo:[]}],
    evType:'kei'
  });
  document.getElementById('landing').style.display='none';
  document.getElementById('app').style.display='flex';
  render();
}

function startSample(){
  Object.assign(D, JSON.parse(JSON.stringify(SAMPLE_D)));
  D.step=0;
  document.getElementById('landing').style.display='none';
  document.getElementById('app').style.display='flex';
  render();
}

function loadAndStart(event){
  var file=event.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var loaded=JSON.parse(e.target.result);
      if(typeof loaded!=='object'||!loaded.kamoku)throw new Error('invalid');
      Object.assign(D,loaded);
      D.step=0;
      document.getElementById('landing').style.display='none';
      document.getElementById('app').style.display='flex';
      render();
    }catch(err){
      var msg=document.getElementById('landmsg');
      if(msg)msg.textContent='⚠ 読み込みに失敗しました。正しいJSONファイルか確認してください。';
    }
  };
  reader.readAsText(file);
  event.target.value='';
}

function go(d){if(D.step+d>=0&&D.step+d<STS.length){D.step+=d;render();document.getElementById('fc').scrollTop=0;}}
function goStep(i){D.step=i;render();document.getElementById('fc').scrollTop=0;}
render();
</script>
